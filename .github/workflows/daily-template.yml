name: Daily CSS Template Generator

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 UTC (日本時間 09:00) に実行
  workflow_dispatch: # 手動実行も可能にする

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate new template
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run task:generate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add daily CSS template [auto]"
          branch: "auto/daily-template"
          title: "Daily Update: New CSS Template"
          body: "Automated PR generated by GitHub Actions using Gemini API."
          base: main
          delete-branch: true
