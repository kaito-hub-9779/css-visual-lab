name: Daily CSS Template Generator

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 UTC (日本時間 09:00)
  workflow_dispatch:

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate new template
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run task:generate

      - name: Check build
        run: npm run build

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          BRANCH_NAME="daily-template-$(date +'%Y%m%d-%H%M%S')"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME

      - name: Commit changes
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          git add .
          git commit -m "chore: daily template update"

      - name: Push branch
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          git push origin $BRANCH_NAME

      - name: Create PR
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          gh pr create \
            --title "Daily Template Update" \
            --body "Auto-generated update" \
            --base main \
            --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.no_changes == 'true'
        run: echo "No changes detected. Skipping PR."